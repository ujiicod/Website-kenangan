<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokumen Kenangan</title>
    <style>
        /* Global Styles */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            overflow-x: hidden;
            background: #1a1a1a;
            color: #fff;
        }

        /* Latar Belakang Utama */
        #main-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
            transition: opacity 1s ease-in-out;
        }

        /* Glassmorphism Effect */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* --- Tampilan Intro --- */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: #000;
            transition: opacity 1s ease, visibility 1s;
        }

        #intro-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
            z-index: -1;
        }

        /* Animasi love & peringatan klik */
        .love lower {
            font-size: 5rem;
            animation: spin 5s linear infinite;
            margin-bottom: 96px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* --- TAMBAHAN CSS: Animasi berkedip untuk peringatan musik --- */
        @keyframes blink-warning {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .btn-enter {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        
        .btn-enter:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        /* --- Tampilan Utama --- */
        #main-app {
            display: none;
            padding: 20px;
            min-height: 100vh;
            padding-bottom: 150px;
        }

        /* --- TAMPILAN MUSIK RETRO --- */
        #music-player {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px;
            width: 320px;
            z-index: 100;
            background: linear-gradient(145deg, rgba(160, 82, 45, 0.4), rgba(139, 69, 19, 0.6)) !important;
            border: 2px solid #8b4513 !important;
            box-shadow: 4px 4px 0px #5c2e0b, 0 8px 32px 0 rgba(0, 0, 0, 0.3) !important;
            border-radius: 12px !important;
            font-family: 'Courier New', Courier, monospace !important;
        }

        .retro-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            border: 3px inset #444;
            color: #0f0;
            text-shadow: 0 0 8px #0f0;
        }

        .retro-header h4 {
            margin: 0;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .vinyl-record {
            width: 28px;
            height: 28px;
            background: #111;
            border-radius: 50%;
            border: 2px solid #555;
            position: relative;
            animation: spin 2s linear infinite;
            box-shadow: inset 0 0 5px #000;
        }

        .vinyl-record::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: #ffaa00;
            border-radius: 50%;
            border: 1px solid #fff;
        }

        #music-player .song-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 8px; 
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 10px;
            border-radius: 4px;
            border-left: 4px solid #ffaa00;
            font-size: 0.85rem;
            color: #fff;
        }

        .delete-btn { 
            background: red; 
            color: white; 
            border: none; 
            border-radius: 50%; 
            width: 20px; 
            height: 20px; 
            cursor: pointer; 
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #music-player audio { 
            width: 100%; 
            height: 35px; 
            margin-top: 15px; 
            outline: none; 
            filter: sepia(80%) hue-rotate(350deg) saturate(150%);
            border-radius: 5px;
        }

        /* Container Profil */
        #profiles-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
            margin-left: 360px;
            justify-content: center;
        }

        .profile-card {
            padding: 15px;
            text-align: center;
            width: 180px;
            position: relative;
        }

        .profile-card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
            margin-bottom: 10px;
        }

        .profile-card h3 { font-size: 1.1rem; }
        .profile-card p { font-size: 0.8rem; color: #ddd; }

        /* Container Kenangan (Foto & Video) */
        #memories-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 50px;
            justify-content: center;
            align-items: flex-start;
        }

        .memory-card {
            padding: 10px;
            position: relative;
            width: 300px; 
        }

        /* Jika foto/video terdeteksi mendatar (Horizontal) */
        .memory-card.horizontal {
            width: 450px;
        }
        
        /* Jika foto/video terdeteksi meninggi (Vertikal) */
        .memory-card.vertical {
            width: 260px;
        }

        .memory-card img, .memory-card video {
            width: 100%;
            border-radius: 10px;
            object-fit: contain;
        }

        .memory-card .story {
            margin-top: 5px; 
            font-size: 0.9rem;
            text-align: justify;
            line-height: 1.4;
        }

        .btn-close {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Akhiran */
        .footer-thanks {
            text-align: center;
            margin-top: 60px;
            font-size: 2rem;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* --- Tampilan Upload --- */
        #upload-widget {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
            border-radius: 50px; 
        }

        #upload-widget select, #upload-widget input, #upload-widget button {
            padding: 8px 12px;
            border-radius: 20px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            backdrop-filter: blur(5px);
        }

        #upload-widget select option { color: black; }
        
        #upload-widget button {
            cursor: pointer;
            background: rgba(255, 255, 255, 0.4);
            font-weight: bold;
        }

        #upload-widget button:hover { background: rgba(255, 255, 255, 0.6); }

        .dynamic-input { display: none; }
        .dynamic-input.active { display: block; }
        
        ::placeholder { color: #ddd; }
    </style>
</head>
<body>

    <video id="main-bg" autoplay muted loop>
        <source src="story.mp4" type="video/mp4">
    </video>

    <div id="intro-screen">

        <button onclick="toggleIntroMusic()" style="position: absolute; top: 20px; right: 20px; z-index: 1005; padding: 10px 15px; border-radius: 20px; background: rgba(255, 255, 255, 0.2); color: white; border: 1px solid rgba(255, 255, 255, 0.5); cursor: pointer; backdrop-filter: blur(5px); font-weight: bold; transition: all 0.3s ease;">
            🎵 Sembunyikan/Munculkan Musik
        </button>

        <div id="intro-music-col" class="glass" style="position: absolute; top: 70px; right: 20px; padding: 15px; z-index: 1005; display: block; text-align: center;">
            <p style="margin-bottom: 8px; font-size: 0.9rem; font-weight: bold; color: #fff;">Musik Pembuka</p>
            
            <video id="intro-music-vid" controls autoplay loop style="width: 220px; height: 40px; border-radius: 8px; outline: none;">
                <source src="jalan.mp4" type="video/mp4">
            </video>
            
            <p id="autoplay-warning" style="display: none; margin-top: 8px; font-size: 0.75rem; color: #ffeb3b; animation: blink-warning 1.5s infinite;">
                Klik di mana saja pada layar agar musik menyala!
            </p>
        </div>

        <video id="intro-video" autoplay muted loop>
            <source src="jalan.mp4" type="video/mp4">
        </video>
        <div class="love">❤️</div>
        <button class="btn-enter" onclick="enterSite()">Enter</button>
    </div>

    <div id="main-app">
        
        <button id="btn-show-radio" onclick="toggleRadioPlayer()" style="display: none; position: fixed; top: 20px; left: 20px; z-index: 101; padding: 10px 15px; background: #8b4513; color: white; border: 2px solid #5c2e0b; border-radius: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
            📻 Buka Radio Kenangan
        </button>

        <div id="music-player" class="glass">
            <div class="retro-header">
                <div class="vinyl-record"></div>
                <h4>Radio Kenangan</h4>
                <button onclick="toggleRadioPlayer()" style="margin-left: auto; background: red; color: white; border: none; border-radius: 4px; padding: 2px 8px; cursor: pointer; font-family: sans-serif; font-weight: bold; font-size: 0.8rem;">TUTUP</button>
            </div>
            <div id="playlist-container">
                <div class="song-item">
                    <span onclick="playSong('taylor.mp3')" style="cursor:pointer; text-decoration:underline; color:#0f0;">1. New Year's Day - Taylor ws.</span>
                    <button class="delete-btn" onclick="this.parentElement.remove()">X</button>
                </div>
                <div class="song-item">
                    <span onclick="playSong('olivia.mp3')" style="cursor:pointer; text-decoration:underline; color:#0f0;">2. Drop Dead - Olivia R.</span>
                    <button class="delete-btn" onclick="this.parentElement.remove()">X</button>
                </div>
                <div class="song-item">
                    <span onclick="playSong('salboleh.mp3')" style="cursor:pointer; text-decoration:underline; color:#0f0;">3. Kita Usahakan... - Sal P.</span>
                    <button class="delete-btn" onclick="this.parentElement.remove()">X</button>
                </div>
            </div>
            
            <audio id="audio-element" controls loop></audio>
        </div>

        <div id="profiles-container"></div>

        <div id="memories-container"></div>

        <div class="footer-thanks">
            Terima kasih telah menjadi bagian dari perjalanan ini ❤️ 
            love u guys
        </div>
    </div>

    <div id="upload-widget" class="glass" style="display: none;">
        <select id="upload-type" onchange="toggleInputs()">
            <option value="profile">Tambah Profil</option>
            <option value="memory">Tambah Foto/Video</option>
            <option value="music">Tambah Lagu</option>
            <option value="background">Ganti Latar</option>
            <option value="intro-music">Ganti Musik Intro</option>
        </select>

        <input type="file" id="file-input" accept="image/*">
        
        <input type="text" id="input-name" class="dynamic-input active" placeholder="Nama">
        <input type="text" id="input-dob" class="dynamic-input active" placeholder="Tgl Lahir (cth: 12 Jan)">
        
        <input type="text" id="input-story" class="dynamic-input" placeholder="Tulis cerita singkat...">
        
        <button onclick="processUpload()">Tambahkan</button>
    </div>

    <script>
        // =================== TAMBAHAN BARU: TRIK MEMAKSA BROWSER MEMUTAR MUSIK AWAL ===================
        window.addEventListener('DOMContentLoaded', function() {
            const introMusic = document.getElementById('intro-music-vid');
            const warningText = document.getElementById('autoplay-warning');

            if (introMusic) {
                // Pastikan volume penuh
                introMusic.volume = 1.0;
                
                // Minta browser memutar lagu
                let playPromise = introMusic.play();

                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        // Jika berhasil (browser mengizinkan), sembunyikan teks peringatan
                        if (warningText) warningText.style.display = 'none';
                    }).catch(error => {
                        // Jika gagal (diblokir browser), tampilkan peringatan
                        if (warningText) warningText.style.display = 'block';

                        // Buat layar peka sentuhan/klik, dan paksakan play pada klik pertama
                        document.body.addEventListener('click', function forcePlay() {
                            introMusic.play();
                            if (warningText) warningText.style.display = 'none';
                            // Hapus fungsi ini setelah sukses diklik sekali agar tidak memberatkan browser
                            document.body.removeEventListener('click', forcePlay);
                        });
                    });
                }
            }
        });
        // ==============================================================================================

        function enterSite() {
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-screen').style.visibility = 'hidden';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('upload-widget').style.display = 'flex';
            }, 1000);
        }

        function toggleInputs() {
            const type = document.getElementById('upload-type').value;
            const fileInput = document.getElementById('file-input');
            const nameInput = document.getElementById('input-name');
            const dobInput = document.getElementById('input-dob');
            const storyInput = document.getElementById('input-story');

            nameInput.classList.remove('active');
            dobInput.classList.remove('active');
            storyInput.classList.remove('active');

            if (type === 'profile') {
                fileInput.accept = 'image/*';
                nameInput.classList.add('active');
                dobInput.classList.add('active');
            } else if (type === 'memory') {
                fileInput.accept = 'image/*,video/*';
                storyInput.classList.add('active');
            } else if (type === 'music') {
                fileInput.accept = 'audio/*';
            } else if (type === 'background') {
                fileInput.accept = 'image/*,video/*';
            } else if (type === 'intro-music') { 
                fileInput.accept = 'video/*,audio/*';
            }
        }

        function appendOrganizedMemoryCard(cardElement, isHorizontal) {
            let containerId = isHorizontal ? 'section-horizontal' : 'section-vertical';
            let title = isHorizontal ? '📸 Album Horizontal' : '📱 Album Vertikal';
            
            let containerGroup = document.getElementById(containerId);
            
            if (!containerGroup) {
                containerGroup = document.createElement('div');
                containerGroup.id = containerId;
                containerGroup.style.width = '100%'; 
                containerGroup.innerHTML = `
                    <h3 style="text-align:center; width:100%; padding: 10px; margin-top:20px; border-bottom: 2px solid rgba(255,255,255,0.3);">${title}</h3>
                    <div class="flex-wrapper" style="display:flex; flex-wrap:wrap; gap:20px; justify-content:center; padding: 20px 0;"></div>
                `;
                document.getElementById('memories-container').appendChild(containerGroup);
            }
            
            if (isHorizontal) {
                cardElement.classList.add('horizontal');
            } else {
                cardElement.classList.add('vertical');
            }
            
            containerGroup.querySelector('.flex-wrapper').appendChild(cardElement);
        }

        function processUpload() {
            const type = document.getElementById('upload-type').value;
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];

            if (!file) {
                alert("Harap pilih file terlebih dahulu!");
                return;
            }

            const fileURL = URL.createObjectURL(file);

            if (type === 'profile') {
                const name = document.getElementById('input-name').value || "Tanpa Nama";
                const dob = document.getElementById('input-dob').value || "-";
                
                const card = document.createElement('div');
                card.className = 'profile-card glass';
                card.innerHTML = `
                    <button class="btn-close" onclick="this.parentElement.remove()">X</button>
                    <img src="${fileURL}" alt="Profile">
                    <h3>${name}</h3>
                    <p>${dob}</p>
                `;
                document.getElementById('profiles-container').appendChild(card);

            } else if (type === 'memory') {
                const story = document.getElementById('input-story').value || "";
                const isVideo = file.type.startsWith('video');
                
                const card = document.createElement('div');
                card.className = 'memory-card glass';
                
                let mediaTag = isVideo 
                    ? `<video src="${fileURL}" controls></video>` 
                    : `<img src="${fileURL}" alt="Memory">`;

                card.innerHTML = `
                    <button class="btn-close" onclick="this.parentElement.remove()">X</button>
                    ${mediaTag}
                    <div class="story">${story}</div>
                `;
                
                if (isVideo) {
                    const vidChecker = document.createElement('video');
                    vidChecker.onloadedmetadata = function() {
                        const isHorizontal = this.videoWidth > this.videoHeight;
                        appendOrganizedMemoryCard(card, isHorizontal);
                    };
                    vidChecker.src = fileURL;
                } else {
                    const imgChecker = new Image();
                    imgChecker.onload = function() {
                        const isHorizontal = this.width > this.height;
                        appendOrganizedMemoryCard(card, isHorizontal);
                    };
                    imgChecker.src = fileURL;
                }

            } else if (type === 'music') {
                const songName = file.name.replace(/\.[^/.]+$/, "");
                const playlist = document.getElementById('playlist-container');
                const songCount = playlist.children.length + 1;
                
                const item = document.createElement('div');
                item.className = 'song-item';
                item.innerHTML = `
                    <span onclick="playSong('${fileURL}')" style="cursor:pointer; text-decoration:underline; color:#0f0;">${songCount}. ${songName} (Klik Putar)</span>
                    <button class="delete-btn" onclick="this.parentElement.remove()">X</button>
                `;
                playlist.appendChild(item);
                
                playSong(fileURL);

            } else if (type === 'background') {
                const isVideo = file.type.startsWith('video');
                const bgElement = document.getElementById('main-bg');
                const parent = bgElement.parentElement;
                
                bgElement.remove(); 

                if (isVideo) {
                    const newBg = document.createElement('video');
                    newBg.id = 'main-bg';
                    newBg.autoplay = true;
                    newBg.muted = true;
                    newBg.loop = true;
                    newBg.innerHTML = `<source src="${fileURL}" type="${file.type}">`;
                    parent.insertBefore(newBg, document.body.firstChild);
                } else {
                    const newBg = document.createElement('img');
                    newBg.id = 'main-bg';
                    newBg.src = fileURL;
                    parent.insertBefore(newBg, document.body.firstChild);
                }
            } else if (type === 'intro-music') { 
                const introVid = document.getElementById('intro-music-vid');
                if (introVid) {
                    introVid.src = fileURL;
                    introVid.play().catch(e => alert("Silakan klik di mana saja pada layar atau tekan ikon Play di video intro terlebih dahulu."));
                    alert("Musik Intro berhasil diganti dan siap diputar!");
                }
            }

            fileInput.value = '';
            document.getElementById('input-name').value = '';
            document.getElementById('input-dob').value = '';
            document.getElementById('input-story').value = '';
        }

        function playSong(url) {
            const audioEl = document.getElementById('audio-element');
            audioEl.src = url;
            audioEl.loop = true; 
            audioEl.play().catch(error => {
                console.log("Browser memblokir pemutaran otomatis:", error);
                alert("Browser Anda memerlukan izin untuk memutar lagu. Silakan klik tombol 'Play' (▶) di kotak audio retro di bawah judul lagu.");
            });
        }

        toggleInputs();

        function toggleIntroMusic() {
            const col = document.getElementById('intro-music-col');
            if (col.style.display === 'none') {
                col.style.display = 'block';
            } else {
                col.style.display = 'none';
            }
        }

        function toggleRadioPlayer() {
            const player = document.getElementById('music-player');
            const showBtn = document.getElementById('btn-show-radio');
            if (player.style.display === 'none') {
                player.style.display = 'block';
                showBtn.style.display = 'none';
            } else {
                player.style.display = 'none';
                showBtn.style.display = 'block';
            }
        }

        document.querySelector('.btn-enter').addEventListener('click', function() {
            const introVid = document.getElementById('intro-music-vid');
            if(introVid) {
                introVid.pause();
            }
        });

        const introVidElement = document.getElementById('intro-music-vid');
        if(introVidElement) {
            introVidElement.addEventListener('ended', function() {
                this.currentTime = 0;
                this.play();
            });
        }

    </script>
</body>
</html>
